  ::-webkit-scrollbar{width:8px;}::-webkit-scrollbar-track{background:#0a1209;}::-webkit-scrollbar-thumb{background:#8B1A1A;border-radius:4px;}::-webkit-scrollbar-thumb:hover{background:#a02020;}
  
  @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}

  .bike-card{transition:all 0.25s cubic-bezier(0.4,0,0.2,1);}
  .bike-card:hover{transform:translateY(-6px);border-color:rgba(139,26,26,0.6)!important;box-shadow:0 12px 40px rgba(139,26,26,0.2),0 0px 60px rgba(0,0,0,0.3);}

  .btn-primary:focus-visible{outline:2px solid #e8a0a0;outline-offset:2px;}
  
  .filter-btn{transition:all 0.2s ease;}
  .filter-btn:hover{border-color:#8B1A1A!important;background:rgba(139,26,26,0.08);}
  .filter-btn:focus-visible{outline:2px solid #8B1A1A;outline-offset:2px;border-radius:8px;}

  .search-container{position:relative;width:100%;margin-bottom:28px;}
  .search-input{width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#f0ece2;padding:12px 16px;border-radius:10px;font-family:Georgia,serif;font-size:14px;transition:all 0.2s ease;}
  .search-input:focus{background:rgba(255,255,255,0.12);border-color:rgba(139,26,26,0.5);box-shadow:0 0 0 3px rgba(139,26,26,0.1);outline:none;}
  .search-input::placeholder{color:rgba(240,236,226,0.4);}

  .search-results{position:absolute;top:100%;left:0;right:0;background:rgba(14,26,16,0.98);border:1px solid rgba(255,255,255,0.1);border-top:none;border-radius:0 0 10px 10px;max-height:400px;overflow-y:auto;z-index:50;margin-top:-1px;box-shadow:0 8px 24px rgba(0,0,0,0.4);}
  .search-result-item{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;transition:background 0.15s ease;display:flex;justify-content:space-between;align-items:center;}
  .search-result-item:hover{background:rgba(139,26,26,0.15);}
  .search-result-item:last-child{border-bottom:none;}
  .search-result-title{font-size:13px;color:#f0ece2;font-weight:600;}
  .search-result-meta{font-size:11px;color:rgba(240,236,226,0.5);margin-top:2px;}
  .search-result-price{font-size:13px;color:#e8a0a0;font-weight:700;}
  .search-empty{padding:20px;text-align:center;color:rgba(240,236,226,0.5);font-size:13px;}
  
  a{text-decoration:none;}
  
  @media(prefers-reduced-motion:reduce){
    *{animation-duration:0.01ms!important;animation-iteration-count:1!important;transition-duration:0.01ms!important;scroll-behavior:auto!important;}
  }
</style>

<script type="text/babel">

const BIKES = [

  { id:10, cat:"Adult",   name:'26" MTB Shimano $130',     desc:"Premium Shimano MTB. Full suspension fork. Top spec.",                price:"$130",    tag:"Premium",    img:"" },

  { id:14, cat:"Folding", name:'26" Folding Meg Wheel',    desc:"Premium mag wheels. Full suspension. Top of the range.",             price:"$160",    tag:"Top Range",  img:"images/folding-bike-14.jpg" },

  { name:"Mountain Metro Tyre",                price:"$5",       cat:"Tyres & Tubes" },
  { name:"Bedrock Mountain Tyre",              price:"$8",       cat:"Tyres & Tubes" },
  { name:"Inner Tubes",                        price:"$2–$3",    cat:"Tyres & Tubes" },
  { name:"Small Bicycle Pump",                 price:"$2",       cat:"Pumps" },
  { name:"Floor Pump (standard)",              price:"$3",       cat:"Pumps" },
  { name:"Big Floor Pump",                     price:"$5",       cat:"Pumps" },
  { name:"Pump with Pressure Gauge",           price:"$5",       cat:"Pumps" },
  { name:"Speaker Bike Light (USB charging)",  price:"$7",       cat:"Lights & Accessories" },
  { name:"Bicycle Phone Holder",               price:"$10",      cat:"Lights & Accessories" },
  { name:"Cable Lock",                         price:"$2",       cat:"Lights & Accessories" },
  { name:"Bike Foot Rest Pegs (pair)",         price:"$5",       cat:"Lights & Accessories" },
  { name:"Kids Training Wheels",               price:"$5",       cat:"Lights & Accessories" },
  { name:"Full Brake Caliper Set",             price:"$5",       cat:"Brakes" },
  { name:"Brake Lever Full Set",               price:"$5",       cat:"Brakes" },
  { name:"Brake / Gear Cables (pair)",         price:"$1",       cat:"Brakes" },
  { name:"Disc Brake Rotor & Caliper",         price:"$6",       cat:"Brakes" },
  { name:"Disc Brake Drum",                    price:"$5",       cat:"Brakes" },
  { name:"Shimano Gear Levers",                price:"$6",       cat:"Drivetrain" },
  { name:"7-Speed Cassette",                   price:"$4",       cat:"Drivetrain" },
  { name:"Rear Derailleur (SunRace Index)",    price:"$2",       cat:"Drivetrain" },
  { name:"Rear Derailleur (Shimano type)",     price:"$4",       cat:"Drivetrain" },
  { name:"Rear Derailleur (Lema)",             price:"$4",       cat:"Drivetrain" },
  { name:"Front Derailleur",                   price:"$3",       cat:"Drivetrain" },
  { name:"Shimano Front Jumper",               price:"$4",       cat:"Drivetrain" },
  { name:"Crankset (triple ring)",             price:"$5–$6",    cat:"Drivetrain" },
  { name:"Buffalo Gear Crankset",              price:"$8",       cat:"Drivetrain" },
  { name:"Black Horse 52 Gear",                price:"$10",      cat:"Drivetrain" },
  { name:"Mountain 52 Gear",                   price:"$10",      cat:"Drivetrain" },
  { name:"Bottom Bracket",                     price:"$4",       cat:"Drivetrain" },
  { name:"Pedals (pair)",                      price:"$3",       cat:"Drivetrain" },
  { name:"Wheel Rim",                          price:"$13",      cat:"Wheels & Frame" },
  { name:"Eagle Hub",                          price:"$15",      cat:"Wheels & Frame" },
  { name:"Rear Hub",                           price:"$3",       cat:"Wheels & Frame" },
  { name:"Axle Bolt",                          price:"$1 each",  cat:"Wheels & Frame" },
  { name:"Spokes (MTB/Black horse/Digiwheel)", price:"$1/20",    cat:"Wheels & Frame" },
  { name:'Spokes (Buffalo/29"/20")',           price:"$1/10",    cat:"Wheels & Frame" },
  { name:'MTB Suspension Fork 26"',            price:"$12",      cat:"Wheels & Frame" },
  { name:'MTB Suspension Fork 29"',            price:"$18",      cat:"Wheels & Frame" },
  { name:"Ordinary Steel Fork",                price:"$5",       cat:"Wheels & Frame" },
  { name:"Headset",                            price:"$5",       cat:"Wheels & Frame" },
  { name:"Handlebar Stem",                     price:"$2–$3",    cat:"Wheels & Frame" },
  { name:"Seat Post",                          price:"$2",       cat:"Wheels & Frame" },
  { name:"Bike Saddle",                        price:"$4",       cat:"Wheels & Frame" },
  { name:"Metal Mudguards (pair)",             price:"$5",       cat:"Wheels & Frame" },
  { name:"Plastic Mudguards",                  price:"$2–$2.50", cat:"Wheels & Frame" },
];

const SYSTEM_PROMPT = `You are Spoke, a friendly assistant for Marshy Investments — a bicycle shop at Shop 62, Chinhoyi Street, Harare (Cnr Chinhoyi & Abercorn St), opposite Usman Fabric.

SHOP INFO:
- WhatsApp: 0771687216
- Hours: Monday–Saturday, 8am–5pm
- Payments: USD cash, EcoCash, Zipit
- Address: Shop 62 Chinhoyi St, Cnr Abercorn, Harare. Opposite Usman Fabric.

KIDS BIKES: Tricycle $25, 12" $45–$50 (age 2–5), 16" $50–$65 (age 4–8), 20" $60–$85 (age 6–11), 20" TJX $90 (age 6–13), 20" BMX $90.
ADULT/MTB: 26" MTB entry $80, 26" MTB+carrier $85–$90, 26" MTB Shimano $100, 26" MTB Shimano premium $130, Buffalo type $120.
FOLDING: 26" Folding Shimano $120, 26" Folding double shock $130, 26" Folding Meg $160.
PARTS: Tyres $3–$15, Inner tubes $2–$3, Pumps $2–$5, Brake set $5, Disc brake $6, Gear levers $6, Cassette $4, Derailleurs $2–$4, Cranksets $5–$10, Wheel rim $13, MTB fork 26" $12 / 29" $18, Headset $5, Saddle $4, Mudguards $2–$5, Cable lock $2, Phone holder $10, Speaker light $7, Training wheels $5.

Be warm, helpful, concise. Always end by inviting them to visit or WhatsApp 0771687216. Never invent prices.`;

const WHATSAPP = "https://wa.me/263771687216";
const PHONE = "0771687216";
const ADDRESS = "Shop No 62, Chinhoyi Street\n(Cnr Chinhoyi & Abercorn St)\nOpposite Usman Fabric, Harare";
const QUICK_QUESTIONS = ["Best bike for commuting?","Kids bike for a 7 year old?","What's your cheapest bike?","Where is your shop?"];

const TypingDots = memo(() => (
  <div style={{display:"flex",gap:5,padding:"10px 14px",background:"rgba(255,255,255,0.07)",borderRadius:"14px 14px 14px 3px",alignSelf:"flex-start",animation:"slideIn 0.3s ease"}}>
    {[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:"#8B1A1A",animation:"bounce 1.2s infinite",animationDelay:`${i*0.2}s`}}/>)}
  </div>
));
TypingDots.displayName = "TypingDots";

const Message = memo(({message, renderText}) => (
  <div style={{display:"flex",justifyContent:message.role==="user"?"flex-end":"flex-start",animation:"slideIn 0.3s ease"}}>
    <div style={{maxWidth:"83%",background:message.role==="user"?"linear-gradient(135deg,#8B1A1A,#6B1212)":"rgba(255,255,255,0.07)",color:"#f0ece2",borderRadius:message.role==="user"?"14px 14px 3px 14px":"14px 14px 14px 3px",padding:"10px 13px",fontSize:13,lineHeight:1.65,border:message.role==="assistant"?"1px solid rgba(255,255,255,0.08)":"none"}}>
      {renderText(message.text)}
    </div>
  </div>
));
Message.displayName = "Message";

const SearchBar = memo(({query, setQuery, searchResults, onSelectItem}) => {
  const {bikes, spares} = searchResults;
  return (
    <div className="search-container">
      <input type="search" className="search-input" placeholder="🔍 Search bikes, parts, categories..." value={query} onChange={e=>setQuery(e.target.value)} aria-label="Search products"/>
      {query.trim() && (
        <div className="search-results">
          {bikes.length > 0 && bikes.map(bike=>(
            <div key={`bike-${bike.id}`} className="search-result-item" onClick={()=>onSelectItem(bike)}>
              <div><div className="search-result-title">🚲 {bike.name}</div><div className="search-result-meta">{bike.cat} • {bike.tag}</div></div>
              <div className="search-result-price">{bike.price}</div>
            </div>
          ))}
          {spares.length > 0 && spares.map((spare,idx)=>(
            <div key={`spare-${idx}`} className="search-result-item"><div><div className="search-result-title">🔧 {spare.name}</div><div className="search-result-meta">{spare.cat}</div></div><div className="search-result-price">{spare.price}</div></div>
          ))}
          {!bikes.length && !spares.length && <div className="search-empty">No results found. Try different keywords!</div>}
        </div>
      )}
    </div>
  );
});
SearchBar.displayName = "SearchBar";

const useSearch = (query) => {
  return useMemo(() => {
    if (!query.trim()) return {bikes:[], spares:[], hasResults:false};
    const lowerQuery = query.toLowerCase();
    const bikes = BIKES.filter(b => b.name.toLowerCase().includes(lowerQuery) || b.desc.toLowerCase().includes(lowerQuery) || b.tag.toLowerCase().includes(lowerQuery) || b.cat.toLowerCase().includes(lowerQuery));
    const spares = SPARES.filter(s => s.name.toLowerCase().includes(lowerQuery) || s.cat.toLowerCase().includes(lowerQuery));
    return {bikes, spares, hasResults: bikes.length > 0 || spares.length > 0};
  }, [query]);
};

const ChatBot = memo(({onClose}) => {
  const [msgs, setMsgs] = useState([{role:"assistant",text:"👋 Hello! I'm **Spoke**, your guide at Marshy Investments.\n\nAsk me about bikes, prices, spare parts, or let me help you find the right bike!"}]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);

  useEffect(()=>bottomRef.current?.scrollIntoView({behavior:"smooth"}),[msgs,loading]);

  const renderText = useCallback((t) => t.split("\n").map((line,i)=>{
    const parts=line.split(/\*\*(.*?)\*\*/g);
    return React.createElement("span",{key:i},...parts.map((p,j)=>j%2===1?React.createElement("strong",{key:j},p):p),i<t.split("\n").length-1?React.createElement("br"):"");
  }), []);

  const send = useCallback(async(text)=>{
    const q = text||input.trim();
    if(!q||loading) return;
    setInput("");
    const next=[...msgs,{role:"user",text:q}];
    setMsgs(next);
    setLoading(true);
    try{
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,system:SYSTEM_PROMPT,messages:next.map(m=>({role:m.role,content:m.text}))})
      });
      const data = await res.json();
      const reply = data.content?.map(b=>b.text||"").join("")||"Sorry, something went wrong. Please WhatsApp us on 0771687216.";
      setMsgs(p=>[...p,{role:"assistant",text:reply}]);
    }catch(e){
      console.error("Chat error:",e);
      setMsgs(p=>[...p,{role:"assistant",text:"Connection issue. Please WhatsApp us on 0771687216 😊"}]);
    }
    setLoading(false);
  }, [msgs, input, loading]);

  return (
    <div style={{position:"fixed",bottom:24,right:16,width:340,maxWidth:"calc(100vw - 32px)",height:490,background:"#0e1a10",borderRadius:20,boxShadow:"0 20px 60px rgba(0,0,0,0.6)",display:"flex",flexDirection:"column",zIndex:1000,border:"1px solid rgba(255,255,255,0.1)",overflow:"hidden",animation:"slideIn 0.3s ease"}}>
      <div style={{background:"linear-gradient(90deg,#8B1A1A,#6B1212)",padding:"12px 16px",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <div style={{width:36,height:36,borderRadius:"50%",background:"rgba(255,255,255,0.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🚲</div>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:14,color:"#fff"}}>Spoke — Marshy Investments</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.75)",display:"flex",alignItems:"center",gap:4}}>
            <span style={{width:6,height:6,borderRadius:"50%",background:"#4caf50",display:"inline-block"}}/>Online now
          </div>
        </div>
        <button onClick={onClose} aria-label="Close chat" style={{background:"none",border:"none",color:"rgba(255,255,255,0.8)",cursor:"pointer",fontSize:20,lineHeight:1,padding:4,transition:"color 0.2s"}}>✕</button>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"14px 12px",display:"flex",flexDirection:"column",gap:10}}>
        {msgs.map((m,i)=><Message key={i} message={m} renderText={renderText}/>)}
        {loading && <TypingDots/>}
        {msgs.length===1 && (
          <div style={{display:"flex",flexDirection:"column",gap:6,paddingTop:4}}>
            {QUICK_QUESTIONS.map((q,i)=>(
              <button key={i} onClick={()=>send(q)} className="filter-btn" style={{background:"rgba(139,26,26,0.12)",border:"1px solid rgba(139,26,26,0.35)",color:"#e8a0a0",borderRadius:10,padding:"8px 12px",cursor:"pointer",fontSize:12,textAlign:"left",fontFamily:"Georgia,serif",width:"100%"}}>
                {q}
              </button>
            ))}
          </div>
        )}
        <div ref={bottomRef}/>
      </div>
      <a href={WHATSAPP} target="_blank" rel="noopener noreferrer" style={{background:"#25D366",color:"#fff",textAlign:"center",padding:"8px",fontSize:12,fontWeight:700,display:"block",flexShrink:0}}>
        💬 Chat on WhatsApp → {PHONE}
      </a>
      <div style={{padding:"10px 12px",background:"rgba(0,0,0,0.3)",display:"flex",gap:8,flexShrink:0}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Ask about bikes or parts…" aria-label="Chat input" style={{flex:1,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:10,padding:"9px 12px",color:"#f0ece2",fontFamily:"Georgia,serif",fontSize:13,outline:"none",transition:"border-color 0.2s"}}/>
        <button onClick={()=>send()} disabled={!input.trim()||loading} aria-label="Send message" style={{width:38,height:38,borderRadius:10,background:input.trim()&&!loading?"#8B1A1A":"rgba(139,26,26,0.3)",border:"none",color:"#fff",cursor:input.trim()&&!loading?"pointer":"default",fontSize:16,flexShrink:0,transition:"all 0.2s"}}>➤</button>
      </div>
    </div>
  );
});
ChatBot.displayName = "ChatBot";

const BikeCard = memo(({bike, featured = false}) => (
  <div className="bike-card" style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:featured?14:16,padding:featured?18:20,display:"flex",flexDirection:"column"}}>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
      <span style={{background:"rgba(139,26,26,0.2)",color:"#e8a0a0",fontSize:10,padding:"3px 10px",borderRadius:20,fontWeight:700}}>{bike.tag}</span>
      <span style={{background:"rgba(255,255,255,0.06)",color:"rgba(240,236,226,0.5)",fontSize:10,padding:"3px 10px",borderRadius:20}}>{bike.cat}</span>
    </div>
    {bike.img ? <img src={bike.img} alt={bike.name} style={{width:"100%",height:featured?140:160,objectFit:"cover",borderRadius:8,marginBottom:featured?8:12}}/> : <div style={{fontSize:featured?32:38,marginBottom:featured?8:10,textAlign:"center"}}>🚲</div>}
    <div style={{fontWeight:700,fontSize:featured?14:15,color:"#f0ece2",marginBottom:featured?4:6}}>{bike.name}</div>
    <div style={{fontSize:featured?11:12,color:"rgba(240,236,226,0.6)",lineHeight:1.5,marginBottom:featured?10:14,flex:1}}>{bike.desc}</div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <span style={{fontSize:featured?18:22,fontWeight:700,color:"#e8a0a0"}}>{bike.price}</span>
      {!featured && <a href={WHATSAPP} target="_blank" rel="noopener noreferrer" style={{background:"#25D366",color:"#fff",padding:"7px 14px",borderRadius:8,fontSize:12,fontWeight:700,transition:"transform 0.2s"}}>Order</a>}
    </div>
  </div>
));
BikeCard.displayName = "BikeCard";

const SpareRow = memo(({spare, isLast}) => (
  <div className="spare-row" style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 18px",borderBottom:!isLast?"1px solid rgba(255,255,255,0.05)":"none"}}>
    <span style={{fontSize:13,color:"#f0ece2"}}>{spare.name}</span>
    <span style={{fontSize:13,fontWeight:700,color:"#e8a0a0",whiteSpace:"nowrap",marginLeft:16}}>{spare.price}</span>
  </div>
));
SpareRow.displayName = "SpareRow";

const Navigation = memo(({section, onNavigate}) => {
  const navLinks = [{id:"home",label:"Home"},{id:"bikes",label:"Bikes"},{id:"spares",label:"Parts"},{id:"contact",label:"Contact"}];
  return (
    <nav style={{position:"sticky",top:0,zIndex:100,background:"rgba(10,18,9,0.97)",backdropFilter:"blur(12px)",borderBottom:"1px solid rgba(139,26,26,0.3)",padding:"0 16px",animation:"fadeIn 0.5s ease"}}>
      <div style={{maxWidth:1100,margin:"0 auto",display:"flex",alignItems:"center",height:58,gap:16,flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
          <div style={{width:34,height:34,borderRadius:"50%",background:"#8B1A1A",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>🚲</div>
          <div>
            <div style={{fontWeight:700,fontSize:14,color:"#f0ece2"}}>Marshy Investments</div>
            <div style={{fontSize:10,color:"#8B1A1A",letterSpacing:2,textTransform:"uppercase"}}>Harare · Bicycles</div>
          </div>
        </div>
        <div style={{display:"flex",gap:16,marginLeft:"auto",alignItems:"center",flexWrap:"wrap"}}>
          {navLinks.map(l=>(
            <button key={l.id} className="nav-link" onClick={()=>onNavigate(l.id)} aria-current={section===l.id?"page":"false"} style={{background:"none",border:"none",color:section===l.id?"#e8a0a0":"rgba(240,236,226,0.7)",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:13,fontWeight:section===l.id?700:400,paddingBottom:2,borderBottom:section===l.id?"2px solid #8B1A1A":"2px solid transparent"}}>
              {l.label}
            </button>
          ))}
          <a href={WHATSAPP} target="_blank" rel="noopener noreferrer" style={{background:"#25D366",color:"#fff",padding:"7px 14px",borderRadius:8,fontSize:12,fontWeight:700,display:"flex",alignItems:"center",gap:5,transition:"transform 0.2s"}}>💬 WhatsApp</a>
        </div>
      </div>
    </nav>
  );
});
Navigation.displayName = "Navigation";

function App() {
  const [section, setSection] = useState("home");
  const [filter, setFilter] = useState("All");
  const [chat, setChat] = useState(false);
  const [searchQuery, setSearchQuery] = useState("");

  const cats = useMemo(() => ["All","Kids","Adult","Folding"], []);
  const filtered = useMemo(() => filter==="All" ? BIKES : BIKES.filter(b=>b.cat===filter), [filter]);
  const spareCats = useMemo(() => [...new Set(SPARES.map(s=>s.cat))], []);
  const searchResults = useSearch(searchQuery);
  const handleNavigate = useCallback((newSection) => { setSection(newSection); setSearchQuery(""); }, []);

  return (
    <div style={{fontFamily:"Georgia,'Times New Roman',serif",background:"#0a1209",minHeight:"100vh",color:"#f0ece2",display:"flex",flexDirection:"column"}}>
      <Navigation section={section} onNavigate={handleNavigate}/>
      <main style={{flex:1}}>
        {section==="home" && (
          <div style={{animation:"fadeUp 0.6s ease"}}>
            <div style={{background:"linear-gradient(135deg,#0a1209 0%,#1a0505 50%,#0a1209 100%)",padding:"70px 24px",textAlign:"center",position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",inset:0,backgroundImage:"radial-gradient(circle at 30% 50%, rgba(139,26,26,0.15) 0%, transparent 60%)",pointerEvents:"none"}}/>
              <div style={{animation:"fadeUp 0.7s ease both",position:"relative"}}>
                <div style={{fontSize:11,letterSpacing:5,color:"#8B1A1A",textTransform:"uppercase",marginBottom:14}}>Harare's Trusted Bicycle Shop</div>
                <h1 style={{fontSize:"clamp(32px,6vw,60px)",fontWeight:700,color:"#f0ece2",lineHeight:1.1,marginBottom:16}}>Marshy<br/><span style={{color:"#8B1A1A"}}>Investments</span></h1>
                <p style={{fontSize:16,color:"rgba(240,236,226,0.7)",maxWidth:480,margin:"0 auto 16px",lineHeight:1.7}}>Quality bicycles & spare parts for every rider in Harare.</p>
                <p style={{fontSize:13,color:"rgba(240,236,226,0.5)",marginBottom:32}}>📍 Shop 62, Chinhoyi St (Cnr Abercorn) · Opposite Usman Fabric</p>
                <div style={{display:"flex",gap:14,justifyContent:"center",flexWrap:"wrap"}}>
                  <button className="btn-primary" onClick={()=>handleNavigate("bikes")} style={{background:"#8B1A1A",color:"#fff",border:"none",padding:"13px 28px",borderRadius:10,fontSize:15,fontWeight:700,cursor:"pointer"}}>Browse Bikes</button>
                  <a href={WHATSAPP} target="_blank" rel="noopener noreferrer" style={{background:"rgba(255,255,255,0.08)",color:"#f0ece2",border:"1px solid rgba(255,255,255,0.2)",padding:"13px 28px",borderRadius:10,fontSize:15,fontWeight:700,transition:"all 0.2s"}}>💬 WhatsApp Us</a>
                </div>
              </div>
            </div>
            <div style={{background:"rgba(139,26,26,0.1)",borderTop:"1px solid rgba(139,26,26,0.2)",borderBottom:"1px solid rgba(139,26,26,0.2)",padding:"20px 24px",display:"flex",justifyContent:"center",gap:40,flexWrap:"wrap"}}>
              {[["14+","Bike Models"],["45+","Spare Parts"],["$25","Starting Price"],["Mon–Sat","8am–5pm"]].map(([v,l])=>(
                <div key={l} style={{textAlign:"center",animation:"fadeUp 0.6s ease both"}}>
                  <div style={{fontSize:22,fontWeight:700,color:"#e8a0a0"}}>{v}</div>
                  <div style={{fontSize:11,color:"rgba(240,236,226,0.6)",letterSpacing:1,textTransform:"uppercase",marginTop:2}}>{l}</div>
                </div>
              ))}
            </div>
            <div style={{padding:"48px 24px",maxWidth:1100,margin:"0 auto"}}>
              <h2 style={{fontSize:26,fontWeight:700,color:"#f0ece2",marginBottom:6}}>Featured Bikes</h2>
              <p style={{color:"rgba(240,236,226,0.6)",marginBottom:28}}>Our most popular models — all in stock in Harare</p>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:16}}>
                {BIKES.slice(1,5).map(b=><div key={b.id} onClick={()=>handleNavigate("bikes")}><BikeCard bike={b} featured={true}/></div>)}
              </div>
              <div style={{textAlign:"center",marginTop:28}}>
                <button className="btn-primary" onClick={()=>handleNavigate("bikes")} style={{background:"#8B1A1A",color:"#fff",border:"none",padding:"11px 26px",borderRadius:10,fontSize:14,fontWeight:700,cursor:"pointer"}}>View All Bikes →</button>
              </div>
            </div>
            <div style={{background:"rgba(255,255,255,0.03)",borderTop:"1px solid rgba(255,255,255,0.06)",padding:"32px 24px",textAlign:"center"}}>
              <div style={{fontSize:11,letterSpacing:3,color:"#8B1A1A",textTransform:"uppercase",marginBottom:12}}>We Accept</div>
              <div style={{display:"flex",gap:14,justifyContent:"center",flexWrap:"wrap"}}>
                {["💵 USD Cash","📱 EcoCash","🏦 Zipit"].map(p=><span key={p} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",padding:"9px 18px",borderRadius:8,fontSize:13,color:"#f0ece2"}}>{p}</span>)}
              </div>
            </div>
          </div>
        )}
        {section==="bikes" && (
          <div style={{padding:"40px 24px",maxWidth:1100,margin:"0 auto",animation:"fadeUp 0.6s ease"}}>
            <h2 style={{fontSize:28,fontWeight:700,color:"#f0ece2",marginBottom:6}}>Our Bicycles</h2>
            <p style={{color:"rgba(240,236,226,0.6)",marginBottom:24}}>All bikes in stock · WhatsApp to confirm availability</p>
            <SearchBar query={searchQuery} setQuery={setSearchQuery} searchResults={searchResults} onSelectItem={(bike)=>{ setSearchQuery(""); window.scrollTo({top:0,behavior:"smooth"}); }}/>
            {searchQuery ? (
              <>
                <h3 style={{fontSize:16,color:"#e8a0a0",marginBottom:16}}>Search Results for "{searchQuery}"</h3>
                {searchResults.bikes.length > 0 ? (
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:18}}>
                    {searchResults.bikes.map(b=><BikeCard key={b.id} bike={b}/>)}
                  </div>
                ) : (
                  <div style={{textAlign:"center",padding:"40px 24px",color:"rgba(240,236,226,0.5)"}}>No bikes match your search</div>
                )}
              </>
            ) : (
              <>
                <div style={{display:"flex",gap:8,marginBottom:28,flexWrap:"wrap"}}>
                  {cats.map(c=>(
                    <button key={c} className="filter-btn" onClick={()=>setFilter(c)} aria-pressed={filter===c} style={{background:filter===c?"#8B1A1A":"rgba(255,255,255,0.06)",color:filter===c?"#fff":"rgba(240,236,226,0.7)",border:`1px solid ${filter===c?"#8B1A1A":"rgba(255,255,255,0.12)"}`,padding:"7px 18px",borderRadius:8,cursor:"pointer",fontFamily:"Georgia,serif",fontSize:13,fontWeight:filter===c?700:400}}>
                      {c}
                    </button>
                  ))}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:18}}>
                  {filtered.map(b=><BikeCard key={b.id} bike={b}/>)}
                </div>
              </>
            )}
          </div>
        )}
        {section==="spares" && (
          <div style={{padding:"40px 24px",maxWidth:900,margin:"0 auto",animation:"fadeUp 0.6s ease"}}>
            <h2 style={{fontSize:28,fontWeight:700,color:"#f0ece2",marginBottom:6}}>Spare Parts & Accessories</h2>
            <p style={{color:"rgba(240,236,226,0.6)",marginBottom:24}}>Wide range in stock · WhatsApp for specific enquiries</p>
            <SearchBar query={searchQuery} setQuery={setSearchQuery} searchResults={searchResults} onSelectItem={()=>setSearchQuery("")}/>
            {searchQuery ? (
              <>
                <h3 style={{fontSize:16,color:"#e8a0a0",marginBottom:16}}>Search Results for "{searchQuery}"</h3>
                {searchResults.spares.length > 0 ? (
                  <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,overflow:"hidden"}}>
                    {searchResults.spares.map((s,i,arr)=><SpareRow key={i} spare={s} isLast={i===arr.length-1}/>)}
                  </div>
                ) : (
                  <div style={{textAlign:"center",padding:"40px 24px",color:"rgba(240,236,226,0.5)"}}>No spare parts match your search</div>
                )}
              </>
            ) : (
              <>
                {spareCats.map(cat=>(
                  <div key={cat} style={{marginBottom:22}}>
                    <div style={{fontSize:11,letterSpacing:3,color:"#8B1A1A",textTransform:"uppercase",marginBottom:8,fontWeight:700}}>{cat}</div>
                    <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,overflow:"hidden"}}>
                      {SPARES.filter(s=>s.cat===cat).map((s,i,arr)=><SpareRow key={i} spare={s} isLast={i===arr.length-1}/>)}
                    </div>
                  </div>
                ))}
              </>
            )}
            <div style={{marginTop:20,padding:18,background:"rgba(139,26,26,0.1)",border:"1px solid rgba(139,26,26,0.25)",borderRadius:12,textAlign:"center"}}>
              <p style={{color:"rgba(240,236,226,0.8)",marginBottom:12,fontSize:14}}>Need a part not listed? We likely have it!</p>
              <a href={WHATSAPP} target="_blank" rel="noopener noreferrer" style={{background:"#25D366",color:"#fff",padding:"9px 22px",borderRadius:8,fontSize:13,fontWeight:700,display:"inline-block",transition:"transform 0.2s"}}>💬 Ask on WhatsApp</a>
            </div>
          </div>
        )}
        {section==="contact" && (
          <div style={{padding:"40px 24px",maxWidth:680,margin:"0 auto",animation:"fadeUp 0.6s ease"}}>
            <h2 style={{fontSize:28,fontWeight:700,color:"#f0ece2",marginBottom:6}}>Contact Us</h2>
            <p style={{color:"rgba(240,236,226,0.6)",marginBottom:32}}>We're happy to help — reach out anytime!</p>
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              {[
                {icon:"📱",label:"WhatsApp / Call",val:PHONE,href:WHATSAPP},
                {icon:"📍",label:"Location",val:ADDRESS},
                {icon:"🕐",label:"Opening Hours",val:"Monday – Saturday · 8:00am – 5:00pm"},
                {icon:"💵",label:"Payments Accepted",val:"USD Cash · EcoCash · Zipit"},
              ].map((c,i)=>(
                <div key={i} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:14,padding:18,display:"flex",alignItems:"flex-start",gap:14}}>
                  <div style={{fontSize:26,flexShrink:0,marginTop:2}}>{c.icon}</div>
                  <div>
                    <div style={{fontSize:10,color:"#8B1A1A",letterSpacing:2,textTransform:"uppercase",marginBottom:5}}>{c.label}</div>
                    {c.href ? <a href={c.href} target="_blank" rel="noopener noreferrer" style={{fontSize:18,fontWeight:700,color:"#e8a0a0",transition:"color 0.2s",textDecoration:"underline"}}>{c.val}</a> : <div style={{fontSize:14,fontWeight:600,color:"#f0ece2",whiteSpace:"pre-line",lineHeight:1.7}}>{c.val}</div>}
                  </div>
                </div>
              ))}
            </div>
            <div style={{marginTop:28,textAlign:"center"}}>
              <a href={WHATSAPP} target="_blank" rel="noopener noreferrer" style={{background:"#25D366",color:"#fff",padding:"14px 36px",borderRadius:12,fontSize:16,fontWeight:700,display:"inline-block",boxShadow:"0 4px 20px rgba(37,211,102,0.3)",transition:"transform 0.2s"}}>💬 Chat on WhatsApp Now</a>
            </div>
          </div>
        )}
      </main>
      <footer style={{borderTop:"1px solid rgba(255,255,255,0.06)",padding:"20px 24px",textAlign:"center",marginTop:40}}>
        <div style={{fontSize:12,color:"rgba(240,236,226,0.4)"}}>© 2026 Marshy Investments · Shop 62, Chinhoyi St (Cnr Abercorn) · Harare · {PHONE}</div>
      </footer>
      {!chat && <button onClick={()=>setChat(true)} aria-label="Open chat" style={{position:"fixed",bottom:24,right:20,width:54,height:54,borderRadius:"50%",background:"linear-gradient(135deg,#8B1A1A,#6B1212)",border:"none",color:"#fff",fontSize:24,cursor:"pointer",boxShadow:"0 4px 20px rgba(139,26,26,0.5)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",animation:"pulse 2s infinite",transition:"transform 0.2s"}}>🚲</button>}
      {chat && <ChatBot onClose={()=>setChat(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
